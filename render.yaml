services:
  - type: web
    name: wordday-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate --schema=prisma/schema.production.prisma
    startCommand: npx prisma db push --schema=prisma/schema.production.prisma && node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wordday-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://wordday123.netlify.app

databases:
  - name: wordday-db
    region: singapore
    plan: free
